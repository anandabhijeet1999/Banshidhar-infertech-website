name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}

      # Quick reachability check — proves the FTP server accepts connections
      # from GitHub Actions runners (i.e. Hostinger isn't blocking the IP).
      - name: Test FTP connectivity
        run: |
          echo "Testing reachability to 82.25.120.69:21..."
          timeout 10 bash -c "</dev/tcp/82.25.120.69/21" && echo "✅ Port 21 is reachable" || (echo "❌ Cannot reach FTP server on port 21" && exit 1)

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.25.120.69
          username: u556528303
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          local-dir: ./out/
          protocol: ftp
          port: 21
          dangerous-clean-slate: false
          log-level: verbose
